<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Translator</title>

<link rel="stylesheet" href="style.css">

</head>
<body>


<header class="header">
    <img src="https://www.martindale-avvo.com/wp-content/uploads/2019/08/iStock-1088905934.jpg" class="logo">
    <h2 class="center-title">Translator</h2>
</header>


<div class="menu">
    <a href="main.html" class="active">Translate</a>
    <a href="wordbase.html">Word Base</a>
</div>


<div class="container">

    
    <div class="card">
        <p class="info">Enter text</p>
        <textarea id="inputText" placeholder="Type text..."></textarea>
    </div>

    
    <div class="card">
        <p class="info">Result</p>
        <div id="result" class="result-box"></div>
    </div>

</div>


<div class="controls">
    <select id="language">
        <option value="tr">Turkish</option>
        <option value="az">Azerbaijani</option>
    </select>

    <button onclick="translateText()">Translate</button>
</div>

<script src="script.js"></script>

</body>
</html>
