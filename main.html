<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple Translation Automation</title>

<link rel="icon" href="https://www.w3schools.com/favicon.ico">

<style>
#result{
color:blue;
}
</style>

</head>
<body>

<hr>
<div class="box">

<h3>Translation Automation</h3>

<p><b>Translate automation project</b></p>

<label>Enter text:</label>
<textarea id="inputText"></textarea>

<label>Select language:</label>
<select id="language">
<option value="tr">Turkish</option>
<option value="az">Azerbaijani</option>
</select>

<button onclick="translateText()">Translate</button>

<p>Result:</p>
<div id="result"></div>

<blockquote>Words available in our word base</blockquote>

<ul>
<li>hello</li>
<li>world</li>
<li>computer</li>
</ul>

<table>
<tr>
<th>English</th>
<th>Turkish</th>
</tr>
<tr>
<td>hello</td>
<td>merhaba</td>
</tr>
</table>

<p>
<a href="https://translate.google.com/" target="_blank">Alternative translator</a>
</p>

<img src="https://www.martindale-avvo.com/wp-content/uploads/2019/08/iStock-1088905934.jpg" width="150">

</div>

<script>

const jsonData = `{
"hello":{"tr":"merhaba","az":"salam"},
"world":{"tr":"dunya","az":"dunya"},
"computer":{"tr":"bilgisayar","az":"komputer"},
"student":{"tr":"ogrenci","az":"telebe"}
}`;


class Translator{

constructor(){
this.dictionary = JSON.parse(jsonData);
}

getTranslation(text,lang){

if(this.dictionary[text]){

const {tr,az} = this.dictionary[text];

if(lang==="tr"){
return tr;
}else{
return az;
}

}

return "Translation not found";

}

}


const translator = new Translator();


const fakeAsync = () =>{
return new Promise((resolve)=>{
resolve();
});
}


const translateText = async () =>{

await fakeAsync();

let text = document.getElementById("inputText").value.toLowerCase();

let lang = document.getElementById("language").value;

let result = translator.getTranslation(text,lang);

document.getElementById("result").innerHTML = result;

}

</script>

</body>
</html>
