<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple Translation Automation</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="header">
<img src="https://www.martindale-avvo.com/wp-content/uploads/2019/08/iStock-1088905934.jpg" class="logo">
<h2>Translator</h2>
</div>

<hr>

<div class="box">

<h3>Translation Automation</h3>

<p class="info">Translate automation project</p>

<label>Enter text:</label>
<textarea id="inputText"></textarea>

<label>Select language:</label>
<select id="language">
<option value="tr">Turkish</option>
<option value="az">Azerbaijani</option>
</select>

<button onclick="translateText()">Translate</button>

<p>Result:</p>
<div id="result"></div>

<p class="info">
<a href="wordbase.html">View Word Base</a>
</p>

</div>

<script src="script.js"></script>

</body>
</html>
